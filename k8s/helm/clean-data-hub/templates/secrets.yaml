# Replace base64 placeholders with real values generated via:
#   echo -n "your-real-secret" | base64
# Or use your CI/CD pipeline (GitHub Actions, Vault, AWS Secrets Manager).
data:
  # Generate: openssl rand -hex 32 | base64
  JWT_SECRET: "Y2hhbmdlLW1lLWluLXByb2R1Y3Rpb24tamF3dC1zZWNyZXQ="

  # Generate: openssl rand -hex 32 | base64
  SESSION_SECRET: "Y2hhbmdlLW1lLWluLXByb2R1Y3Rpb24tc2Vzc2lvbi1zZWNyZXQ="

  # Generate: node -e "console.log(require('crypto').randomBytes(32).toString('hex'))" | base64
  ENCRYPTION_KEY: "Y2hhbmdlLW1lLWluLXByb2R1Y3Rpb24tZW5jcnlwdGlvbi1rZXk="

  # Your Google Gemini API Key (https://aistudio.google.com/app/apikey)
  GEMINI_API_KEY: "eW91ci1nZW1pbmktYXBpLWtleS1oZXJl"

  # Full MongoDB connection string with credentials
  MONGODB_URI: "bW9uZ29kYjovL21vbmdvZGItc2VydmljZToyNzAxNy9kaHVi"

  # Redis auth password (empty string if no auth required)
